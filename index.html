<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HeesLabs</title>
  <link rel="shortcut icon" type="image/png" href="img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a1a;
    }

    a {
      color: #7B5EA7;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Hero */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem 1.5rem 0rem;
    }

    .hero h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 0.4rem;
    }

    .hero p {
      font-size: 0.95rem;
      color: #666;
      max-width: 480px;
    }

    /* Apps section */
    .apps {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 4rem;
      gap: 2rem;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Vora card */
    .app-card {
      text-align: center;
      width: 100%;
      min-height: 400px;
      padding: 3rem 1.5rem;
      border-radius: 16px;
      border: 1px solid #eee;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      margin-bottom: 1rem;
      box-shadow: 0 2px 12px rgba(123, 94, 167, 0.2);
    }

    .app-card h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .app-card .tagline {
      color: #666;
      margin-bottom: 1rem;
    }

    .app-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .app-links a {
      font-size: 0.875rem;
      color: #7B5EA7;
    }

    /* Game showcase */
    .game-showcase {
      width: 100%;
      position: relative;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
    }

    .game-showcase::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
    }

    .game-showcase .game-content {
      position: absolute;
      inset: 0;
      text-align: center;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .game-showcase .game-content .bottom-content {
      position: absolute;
      bottom: 1.25rem;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .game-showcase .game-content .privacy-link a {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.6rem;
      font-family: 'Press Start 2P', sans-serif;
      text-decoration: none;
    }

    .game-showcase .game-content .privacy-link a:hover {
      color: #fff;
    }

    .game-showcase h3 {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      font-family: 'Press Start 2P', sans-serif;
    }

    .game-showcase .tagline {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.85rem;
      font-family: 'Press Start 2P', sans-serif;
    }

    .game-showcase .app-links a {
      font-family: 'Press Start 2P', sans-serif;
    }

    .store-badges {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      align-items: center;
    }

    .store-badges .badge-google img {
      height: 50px;
    }

    .store-badges .badge-apple img,
    .store-badges .badge-apple-img {
      height: 34px;
    }

    .game-showcase .app-links a {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.875rem;
    }

    .game-showcase .app-links a:hover {
      color: #fff;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      border-top: 1px solid #eee;
      color: #999;
      font-size: 0.875rem;
    }

    footer a {
      color: #999;
    }

    footer a:hover {
      color: #7B5EA7;
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>HeesLabs</h1>
    <p>Experimenting to make fun things.</p>
  </section>

  <section class="apps">
    <div class="app-card">
      <img class="app-icon" src="img/icon 512.jpeg" alt="Vora icon">
      <h3 style="color: #7B5EA7;">Vora</h3>
      <p class="tagline">Your AI voice diary</p>
      <div class="store-badges">
        <a class="badge-google" href="https://play.google.com/store/apps/details?id=com.heeslabs.vora"><img
            alt="Get it on Google Play"
            src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png"></a>
        <img class="badge-apple-img" alt="Download on the App Store"
          src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-US?size=250x83">
      </div>
      <div class="app-links">
        <a href="/vora/privacy-policy">Privacy Policy</a>
        <a href="/vora/terms-of-service">Terms of Service</a>
        <a href="/vora/support">Support</a>
      </div>
    </div>

    <div class="game-showcase" style="background-image: url('img/ild2.png');">
      <div class="game-content">
        <h3>Impossible<br>Luck<br>Defense 2</h3>
        <div class="bottom-content">
          <p class="tagline">The better tower defense game</p>
          <div class="store-badges">
            <a class="badge-google" href="https://play.google.com/store/apps/details?id=com.heeslabs.ild2"><img
                alt="Get it on Google Play"
                src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png"></a>
            <a class="badge-apple" href="https://apps.apple.com/us/app/impossible-luck-defense-2/id1550732116"><img
                alt="Download on the App Store"
                src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-US?size=250x83"></a>
          </div>
          <div class="privacy-link">
            <a href="/privacy/android-privacy-policy">Privacy Policy</a>
          </div>
        </div>
      </div>
    </div>

    <div class="game-showcase" style="background-image: url('img/ild1.png');">
      <div class="game-content">
        <h3>Impossible<br>Luck<br>Defense</h3>
        <div class="bottom-content">
          <p class="tagline">A tower defense game</p>
          <div class="store-badges">
            <a class="badge-google"
              href="https://play.google.com/store/apps/details?id=com.HeesApps.impossible_luck_defense"><img
                alt="Get it on Google Play"
                src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png"></a>
            <a class="badge-apple" href="https://apps.apple.com/us/app/impossible-luck-defense/id1455974769"><img
                alt="Download on the App Store"
                src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-US?size=250x83"></a>
          </div>
          <div class="privacy-link">
            <a href="/privacy/ios-privacy-policy">Privacy Policy</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 HeesLabs</p>
  </footer>

</body>

</html>
